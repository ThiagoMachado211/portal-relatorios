<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Exibição - Trechos Longos</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #63b8ea;
      color: #061b9a;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      min-width: 420px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,.2);
    }

    .value {
      font-size: 72px;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Trechos Longos</h1>
    <p>Total de registros</p>
    <div id="total" class="value">...</div>
    <p id="updatedAt">Aguardando dados...</p>
    <p id="status">Conectando...</p>
  </div>

  <script>
    const BASE_URL = window.location.origin;
    const WS_URL = window.location.origin.replace("https://", "wss://").replace("http://", "ws://") + "/cable";

    async function loadData() {
      const response = await fetch(`${BASE_URL}/long_trips/dashboard_data.json`, {credentials: "same-origin"});
      const data = await response.json();

      document.getElementById("total").textContent = data.total_records;
      document.getElementById("updatedAt").textContent = `Atualizado em: ${data.updated_at}`;
    }

    function connectCable() {
      const socket = new WebSocket(WS_URL);

      socket.onopen = () => {
        document.getElementById("status").textContent = "WebSocket conectado";

        socket.send(JSON.stringify({
          command: "subscribe",
          identifier: JSON.stringify({ channel: "LongTripsChannel" })
        }));
      };

      socket.onmessage = (event) => {
        const message = JSON.parse(event.data);

        if (message.type === "ping" || message.type === "welcome" || message.type === "confirm_subscription") {
          return;
        }

        if (message.message && message.message.event === "long_trips_updated") {
          loadData();
        }
      };

      socket.onclose = () => {
        document.getElementById("status").textContent = "WebSocket desconectado. Reconectando...";
        setTimeout(connectCable, 3000);
      };
    }

    loadData();
    connectCable();
  </script>
</body>
</html>
