<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apresentação Power BI</title>

  <style>
    :root {
      --tempo-transicao: 1s;
      --cor-fundo: #000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--cor-fundo);
      font-family: Arial, sans-serif;
    }

    #apresentacao {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: var(--cor-fundo);
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity var(--tempo-transicao) ease-in-out;
      user-select: none;
      pointer-events: none;
    }

    .slide.ativo {
      opacity: 1;
    }

    #mensagem {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: white;
      text-align: center;
      font-size: 24px;
      background: #111;
      z-index: 10;
    }

    #status {
      position: fixed;
      right: 14px;
      bottom: 10px;
      z-index: 20;
      padding: 5px 8px;
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.65);
      background: rgba(0, 0, 0, 0.25);
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    body:hover #status {
      opacity: 1;
    }
  </style>
</head>

<body>
  <main id="apresentacao">
    <img id="slideA" class="slide ativo" alt="Slide atual" />
    <img id="slideB" class="slide" alt="Próximo slide" />

    <div id="mensagem">
      Nenhum slide foi encontrado. Adicione os arquivos PNG ou JPG na pasta
      <strong>&nbsp;slides&nbsp;</strong> e atualize a lista no arquivo
      <strong>&nbsp;slides.json&nbsp;</strong>.
    </div>
  </main>

  <div id="status"></div>

  <script>
    const CONFIG = {
      arquivoLista: "slides.json",
      tempoPorSlide: 20000,
      intervaloAtualizacaoLista: 60000,
      iniciarTelaCheiaAoClicar: true
    };

    const slideA = document.getElementById("slideA");
    const slideB = document.getElementById("slideB");
    const mensagem = document.getElementById("mensagem");
    const status = document.getElementById("status");

    let slides = [];
    let indiceAtual = 0;
    let elementoAtivo = slideA;
    let elementoOculto = slideB;
    let temporizador = null;

    function urlSemCache(caminho) {
      const separador = caminho.includes("?") ? "&" : "?";
      return `${caminho}${separador}v=${Date.now()}`;
    }

    async function carregarLista() {
      try {
        const resposta = await fetch(urlSemCache(CONFIG.arquivoLista), {
          cache: "no-store"
        });

        if (!resposta.ok) {
          throw new Error(`Falha ao carregar ${CONFIG.arquivoLista}`);
        }

        const dados = await resposta.json();

        if (!Array.isArray(dados.slides)) {
          throw new Error("O arquivo slides.json não possui uma lista válida.");
        }

        const novaLista = dados.slides
          .map(item => typeof item === "string" ? { arquivo: item } : item)
          .filter(item => item && item.arquivo);

        const listaMudou =
          JSON.stringify(novaLista) !== JSON.stringify(slides);

        slides = novaLista;

        if (listaMudou) {
          indiceAtual = 0;
          iniciarApresentacao();
        }

        atualizarStatus();
      } catch (erro) {
        console.error(erro);
        if (slides.length === 0) {
          mensagem.style.display = "flex";
        }
      }
    }

    function atualizarStatus() {
      if (slides.length === 0) {
        status.textContent = "Nenhum slide";
        return;
      }

      status.textContent = `${indiceAtual + 1} / ${slides.length}`;
    }

    function obterTempoDoSlide(slide) {
      const segundos = Number(slide.tempo);
      return Number.isFinite(segundos) && segundos > 0
        ? segundos * 1000
        : CONFIG.tempoPorSlide;
    }

    function exibirSlide(indice, primeiraExibicao = false) {
      if (slides.length === 0) {
        mensagem.style.display = "flex";
        return;
      }

      mensagem.style.display = "none";

      const slide = slides[indice];
      const caminho = urlSemCache(`slides/${slide.arquivo}`);

      if (primeiraExibicao) {
        elementoAtivo.src = caminho;
        elementoAtivo.classList.add("ativo");
        elementoOculto.classList.remove("ativo");
        agendarProximo();
        atualizarStatus();
        return;
      }

      elementoOculto.onload = () => {
        elementoOculto.classList.add("ativo");
        elementoAtivo.classList.remove("ativo");

        const antigoAtivo = elementoAtivo;
        elementoAtivo = elementoOculto;
        elementoOculto = antigoAtivo;

        elementoOculto.onload = null;
        agendarProximo();
        atualizarStatus();
      };

      elementoOculto.onerror = () => {
        console.error(`Não foi possível carregar: ${slide.arquivo}`);
        elementoOculto.onload = null;
        elementoOculto.onerror = null;
        avancarSlide();
      };

      elementoOculto.src = caminho;
    }

    function avancarSlide() {
      if (slides.length === 0) return;

      indiceAtual = (indiceAtual + 1) % slides.length;
      exibirSlide(indiceAtual);
    }

    function voltarSlide() {
      if (slides.length === 0) return;

      indiceAtual = (indiceAtual - 1 + slides.length) % slides.length;
      exibirSlide(indiceAtual);
    }

    function agendarProximo() {
      clearTimeout(temporizador);

      if (slides.length <= 1) return;

      temporizador = setTimeout(
        avancarSlide,
        obterTempoDoSlide(slides[indiceAtual])
      );
    }

    function iniciarApresentacao() {
      clearTimeout(temporizador);

      if (slides.length === 0) {
        mensagem.style.display = "flex";
        return;
      }

      exibirSlide(indiceAtual, true);
    }

    async function entrarEmTelaCheia() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        }
      } catch (erro) {
        console.warn("Não foi possível entrar em tela cheia.", erro);
      }
    }

    document.addEventListener("click", () => {
      if (CONFIG.iniciarTelaCheiaAoClicar) {
        entrarEmTelaCheia();
      }
    });

    document.addEventListener("keydown", evento => {
      if (evento.key === "ArrowRight" || evento.key === " ") {
        avancarSlide();
      }

      if (evento.key === "ArrowLeft") {
        voltarSlide();
      }

      if (evento.key.toLowerCase() === "f") {
        entrarEmTelaCheia();
      }
    });

    carregarLista();
    setInterval(carregarLista, CONFIG.intervaloAtualizacaoLista);
  </script>
</body>
</html>
